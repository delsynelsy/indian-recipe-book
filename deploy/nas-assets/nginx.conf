# nginx static server for recipe-book images.
# Cache headers mirror bitcorp-erp/frontend/nginx.dev-nas.conf.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    autoindex off;

    # Health endpoint for docker healthcheck.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Long-lived immutable cache for image assets. Slugs are sha256-derived
    # and won't change once generated, so a year is safe.
    location ~* \.(?:webp|png|jpg|jpeg|gif|avif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        # Allow embedding from any origin (this is what makes images.mohammadasjad.com
        # usable from the rendered static-site output).
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        try_files $uri =404;
    }

    location / {
        # Deny any non-image request paths.
        return 404;
    }

    # Robots: this is a private CDN, do not index.
    add_header X-Robots-Tag "noindex, nofollow" always;
}
