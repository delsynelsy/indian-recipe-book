# nginx static server for recipe-book images.
# Cache headers mirror bitcorp-erp/frontend/nginx.dev-nas.conf.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    autoindex off;

    # Health endpoint for docker healthcheck.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Long-lived immutable cache for image assets. Slugs are sha256-derived
    # and won't change once generated, so a year is safe. The `always` modifier
    # is intentionally NOT used on Cache-Control / Expires so that 404s emitted
    # from `try_files ... =404` fall through to the @notfound handler with
    # short-cache headers instead of being cached for 1y by Cloudflare.
    location ~* \.(?:webp|png|jpg|jpeg|gif|avif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        try_files $uri @notfound;
    }

    # Short-cache 404: lets Cloudflare re-check the origin every minute so a
    # newly uploaded asset shows up quickly instead of being shadowed by a
    # stale 404 baked in under the immutable Cache-Control above.
    location @notfound {
        add_header Cache-Control "public, max-age=60";
        add_header Access-Control-Allow-Origin "*" always;
        return 404;
    }

    location / {
        # Deny any non-image request paths.
        add_header Cache-Control "public, max-age=60";
        return 404;
    }

    # Robots: this is a private CDN, do not index.
    add_header X-Robots-Tag "noindex, nofollow" always;
}
