      - "3/4 taza toor dal (lentejas amarillas partidas)"
      - "4 dientes de ajo finamente picados"
      - "1 cebolla pequeña picada"
      - "1 tomate mediano triturado"
      - "1/2 cdta comino entero"
      - "1/4 cdta chile rojo seco (o en polvo)"
      - "1/2 cdta cúrcuma"
      - "1 cdta ghee"
      - "Cilantro fresco y limón para servir"
    steps:
      - icon: wash
        action: Lavar
        time: "2 min"
        text: "Lavar el toor dal hasta que el agua salga completamente clara. Remojar 20 minutos si hay tiempo (acelera la cocción)."
      - icon: boil
        action: Cocer
        time: "20 min"
        text: "Cocinar el dal con 2 tazas de agua y la cúrcuma a presión media, o en olla normal 20 minutos hasta que esté muy tierno y cremoso."
      - icon: mix
        action: Batir
        time: "1 min"
        text: "Batir el dal cocido con una cuchara de madera o un batidor hasta conseguir una textura cremosa. Ajustar sal."
      - icon: heat
        action: Ghee
        time: "1 min"
        text: "En una sartén pequeña, calentar el ghee a fuego medio-alto hasta que esté bien caliente pero sin humear."
      - icon: temper
        action: Tarka
        time: "30 s"
        text: "Añadir el comino al ghee caliente. Cuando chisporrotee, agregar el chile rojo. En 10 segundos el chile cambiará de color: momento perfecto."
      - icon: sauté
        action: Ajo
        time: "1–2 min"
        text: "Añadir el ajo picado inmediatamente. Sofreír 1–2 minutos removiendo constantemente hasta que se dore uniformemente pero sin quemarse."
      - icon: mix
        action: Tomate
        time: "2 min"
        text: "Incorporar el tomate triturado y cocinar 2 minutos hasta que se sofría. Verter inmediatamente esta tarka sobre el dal en la olla."
      - icon: serve
        action: Servir
        time: ""
        text: "Mezclar suavemente la tarka con el dal. Decorar con cilantro fresco y servir con arroz basmati y un limón partido."
    tip: "El tarka (sofrito final) es lo que define el dal tadka: debe hacerse rápido con aceite muy caliente. El sonido chisporroteo al verter los ingredientes es la señal de que la temperatura es correcta."

