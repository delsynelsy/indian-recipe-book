      css_class: img-chicken-curry
    highlight_ingredients:
      - Pechuga pollo
      - Cebolla
      - Tomate
      - Garam masala
      - Yogur
    ingredients:
      - "300 g pechuga de pollo en cubos de 4 cm"
      - "1 cebolla grande finamente picada"
      - "2 tomates medianos triturados"
      - "1 cdta pasta de jengibre-ajo"
      - "1/2 taza yogur natural sin azúcar"
      - "1 cdta garam masala"
      - "1/2 cdta cúrcuma"
      - "1/2 cdta comino molido"
      - "1/4 cdta chile rojo"
      - "1 cdta aceite de oliva"
    steps:
      - icon: mix
        action: Marinar
        time: "15 min"
        text: "Mezclar el pollo con yogur, cúrcuma y una pizca de sal. Dejar marinar 15 minutos mínimo. El yogur ablanda las fibras del pollo."
      - icon: heat
        action: Calentar
        time: "1 min"
        text: "Calentar el aceite en una olla o cazuela a fuego medio. Añadir comino entero y esperar a que chisporrotee."
      - icon: sauté
        action: Cebolla
        time: "8 min"
        text: "Sofreír la cebolla a fuego medio 8 minutos removiendo frecuentemente hasta obtener un color marrón dorado profundo. No acortar este paso."
      - icon: mix
        action: Masala
        time: "4 min"
        text: "Añadir la pasta de jengibre-ajo, sofreír 1 minuto. Incorporar los tomates triturados con garam masala y chile. Cocinar 4 minutos hasta espesar."
      - icon: mix
        action: Pollo
        time: "2 min"
        text: "Agregar el pollo marinado con todo el yogur de la marinada. Mezclar bien con la salsa masala y sellar el pollo 2 minutos a fuego alto."
      - icon: simmer
        action: Cocinar
        time: "15 min"
        text: "Añadir 1/2 taza de agua caliente. Tapar y cocinar a fuego bajo 15 minutos hasta que el pollo esté tierno y la salsa haya espesado."
      - icon: mix
        action: Ajustar
        time: "2 min"
        text: "Probar y ajustar sal. Si la salsa es muy espesa, añadir un poco de agua. Si es muy líquida, cocinar destapado 2–3 minutos."
      - icon: serve
        action: Servir
        time: ""
        text: "Decorar con cilantro fresco y servir caliente con arroz basmati o roti integral. Acompañar con una rodaja de lima para exprimir al gusto."
    tip: "No saltes el paso del marinado con yogur: el ácido láctico ablanda el pollo y asegura que quede jugoso. La cebolla bien dorada (marrón, no beige) es lo que da profundidad al curry."

  - id: tofu_stir_fry
    name: Tofu & Vegetable Stir-Fry
    subtitle: Salteado de tofu con brócoli y pimientos en salsa de jengibre
    phase: "Fase 5–8"
    meal: Cena
    type: Vegano
    prep: "15 min"
    prep_note: ""
    cook: "15 min"
    servings: "2 porciones"
    nutrition:
      kcal: 200
      protein: 14
      carbs: 12
      fat: 10
    image:
      src: "https://images.mohammadasjad.com/hero/tofu_stir_fry.webp"
      css_class: img-tofu-stir-fry
    highlight_ingredients:
      - Tofu firme
      - Brócoli
      - Pimiento
      - Jengibre
      - Salsa soja
    ingredients:
      - "200 g tofu firme prensado y en cubos"
      - "1 taza brócoli en floretes pequeños"
      - "1 pimiento rojo en juliana"
      - "1 cebolla pequeña en medias lunas"
      - "2 dientes de ajo picados"
      - "1 cdta jengibre fresco rallado"
      - "1 cda salsa de soja baja en sodio"
      - "1/2 cdta aceite de sésamo"
      - "1 cdta aceite de oliva"
      - "Pimienta negra y semillas de sésamo para servir"
    steps:
      - icon: mix
        action: Prensar
        time: "10 min"
        text: "Prensar el tofu 10 minutos para eliminar el exceso de agua. Cortar en cubos de 2 cm. Preparar y cortar todas las verduras antes de comenzar."
      - icon: heat
        action: Dorar
        time: "5 min"
        text: "Calentar aceite de oliva en una sartén o wok a fuego alto. Saltear los cubos de tofu sin moverlos 2 minutos por cada lado hasta que estén dorados."
      - icon: mix
        action: Retirar
        time: "1 min"
        text: "Retirar el tofu dorado y reservar. En la misma sartén caliente añadir un poco más de aceite si es necesario."
      - icon: sauté
        action: Aromáticos
        time: "30 s"
        text: "Sofreír el ajo picado y el jengibre rallado 30 segundos a fuego alto. Remover constantemente para evitar que se quemen."
      - icon: mix
        action: Verduras
        time: "4 min"
        text: "Añadir la cebolla y el pimiento. Saltear 2 minutos a fuego alto. Agregar el brócoli y saltear 2 minutos más. Las verduras deben quedar crujientes."
      - icon: mix
        action: Salsa
        time: "1 min"
        text: "Verter la salsa de soja y el aceite de sésamo sobre las verduras. Mezclar rápidamente a fuego alto."
      - icon: mix
        action: Unir
        time: "1 min"
        text: "Reincorporar el tofu dorado a la sartén. Mezclar suavemente con las verduras y la salsa."
      - icon: serve
        action: Servir
        time: ""
        text: "Servir de inmediato (el stir-fry se arruina si se deja reposar). Espolvorear semillas de sésamo y pimienta negra. Acompañar con arroz de coliflor o edamame."
    tip: "El stir-fry requiere fuego muy alto durante todo el proceso. Si la sartén no humea ligeramente, el fuego es demasiado bajo y las verduras se cocerán en lugar de saltearse."

  - id: palak_soup
    name: Palak Soup
    subtitle: Sopa cremosa de espinacas al estilo indio con jengibre y comino
    phase: "Fase 7–8"
    meal: Cena
    type: Vegano
    prep: "10 min"
    prep_note: ""
    cook: "15 min"
    servings: "2 porciones"
    nutrition:
      kcal: 120
      protein: 6
      carbs: 12
      fat: 4
    image:
      src: "https://images.mohammadasjad.com/hero/palak_soup.webp"
      css_class: img-palak-soup
    highlight_ingredients:
      - Espinacas
      - Jengibre
      - Comino
      - Lima
      - Ajo
    ingredients:
      - "4 tazas espinacas frescas (o 2 tazas congeladas)"
      - "1 cebolla pequeña picada"
      - "3 dientes de ajo picados"
      - "1 cdta jengibre fresco rallado"
      - "1/2 cdta comino molido"
      - "1/4 cdta chile en polvo"
      - "Zumo de 1/2 lima"
      - "2 tazas agua o caldo de verduras"
      - "1 cdta aceite de oliva"
      - "Sal y pimienta negra al gusto"
    steps:
      - icon: heat
        action: Sofreír
        time: "3 min"
        text: "Calentar el aceite en una olla. Sofreír la cebolla, el ajo y el jengibre a fuego medio 3 minutos hasta que estén suaves y fragantes."
      - icon: mix
        action: Especias
        time: "30 s"
        text: "Añadir el comino molido y el chile en polvo. Sofreír 30 segundos hasta que las especias se integren con el sofrito."
      - icon: mix
        action: Espinacas
        time: "2 min"
        text: "Añadir las espinacas frescas. Cocinar 2 minutos removiendo hasta que se marchiten completamente y reduzcan su volumen."
      - icon: pour
        action: Líquido
        time: "1 min"
        text: "Añadir el agua o caldo. Llevar a ebullición y cocinar 5 minutos a fuego medio."
      - icon: blend
        action: Triturar
        time: "2 min"
        text: "Retirar del fuego y triturar con un batidor de mano hasta obtener una sopa completamente lisa y cremosa."
      - icon: mix
        action: Ajustar
        time: "2 min"
        text: "Volver al fuego suave. Ajustar sal y pimienta. Si la sopa es muy espesa, añadir un poco de agua. Añadir el zumo de lima."
      - icon: cook
        action: Hervir
        time: "2 min"
        text: "Dar un hervor final de 2 minutos a fuego suave para integrar el sabor de la lima y ajustar la textura final."
      - icon: serve
        action: Servir
        time: ""
        text: "Servir en cuencos calientes. Decorar con unas gotas de aceite de oliva, semillas de comino tostadas y pimienta negra recién molida."
    tip: "Para la fase final del plan (7–8), esta sopa ligera es perfecta como cena. Añadir 1 cda de yogur griego al servir incrementa la proteína sin afectar demasiado las calorías."

  - id: moong_soup
    name: Moong Dal Soup
    subtitle: Caldo de lentejas verdes suave y reconfortante, ideal para la noche
    phase: "Fase 7–8"
    meal: Cena
    type: Vegano
    prep: "5 min"
    prep_note: ""
    cook: "20 min"
    servings: "2 porciones"
    nutrition:
      kcal: 160
      protein: 10
      carbs: 22
      fat: 3
    image:
      src: "https://images.mohammadasjad.com/hero/moong_soup.webp"
      css_class: img-moong-soup
    highlight_ingredients:
      - Dal moong
      - Jengibre
      - Comino
      - Lima
      - Cilantro
    ingredients:
      - "1/2 taza dal moong partido amarillo"
      - "1 cdta jengibre fresco rallado"
      - "2 dientes de ajo"
      - "1/2 cdta comino entero"
      - "1/4 cdta cúrcuma"
      - "1/4 cdta pimienta negra"
      - "3 tazas agua"
      - "1/2 cdta ghee o aceite de oliva"
      - "Cilantro fresco y zumo de lima para servir"
    steps:
      - icon: wash
        action: Lavar
        time: "2 min"
        text: "Lavar el dal moong partido varias veces hasta que el agua salga completamente clara."
      - icon: boil
        action: Cocer
        time: "15 min"
        text: "Cocer el dal con 3 tazas de agua, cúrcuma y ajo a fuego medio durante 15 minutos hasta que las lentejas estén completamente deshechas."
      - icon: blend
        action: Batir
        time: "1 min"
        text: "Batir ligeramente el dal cocido con un tenedor o batidor para obtener una sopa con textura suave pero no completamente lisa."
      - icon: heat
        action: Tarka
        time: "1 min"
        text: "En una sartén pequeña, calentar el ghee. Añadir el comino entero y esperar a que chisporrotee y se torne aromático."
      - icon: mix
        action: Jengibre
        time: "1 min"
        text: "Añadir el jengibre rallado y la pimienta negra al ghee especiado. Sofreír 30 segundos. El jengibre fresco añade calidez digestiva al caldo."
      - icon: mix
        action: Verter
        time: "1 min"
        text: "Verter la tarka sobre el caldo de dal. Mezclar bien y llevar de nuevo a fuego suave."
      - icon: cook
        action: Ajustar
        time: "3 min"
        text: "Cocinar 3 minutos más a fuego bajo para integrar los sabores. Ajustar la consistencia con agua si es necesario y rectificar la sal."
      - icon: serve
        action: Servir
        time: ""
        text: "Servir bien caliente. Exprimir abundante lima fresca y decorar con hojas de cilantro. Esta sopa es ligera y reconfortante para las cenas del plan final."
    tip: "Esta sopa es el plato perfecto para la fase final: alta en proteína, baja en calorías y muy fácil de digerir por la noche. El dal moong partido no necesita remojo y se cocina rápidamente."
