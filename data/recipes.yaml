  - id: besan_chilla
    name: Besan Chilla
    subtitle: Tortitas crujientes de harina de garbanzo con especias
    phase: "Fase 1–4"
    meal: Desayuno
    type: Vegetariano
    prep: "8 min"
    prep_note: ""
    cook: "15 min"
    servings: "2 porciones (4 chillas)"
    nutrition:
      kcal: 260
      protein: 12
      carbs: 32
      fat: 8
    image:
      src: "https://images.mohammadasjad.com/hero/besan_chilla.webp"
      css_class: img-besan-chilla
    highlight_ingredients:
      - Harina garbanzo
      - Cebolla
      - Tomate
      - Cilantro
      - Comino
    ingredients:
      - "1 taza harina de garbanzo (besan)"
      - "1/2 cebolla finamente picada"
      - "1 tomate pequeño finamente picado"
      - "1/4 taza cilantro fresco picado"
      - "1 chile verde picado (opcional)"
      - "1/2 cdta comino molido"
      - "1/2 cdta cúrcuma"
      - "Sal al gusto"
      - "Aceite de oliva para cocinar"
    steps:
      - icon: mix
        action: Mezclar
        time: "3 min"
        text: "En un bol amplio, combinar harina de garbanzo con comino, cúrcuma y sal. Añadir agua poco a poco hasta obtener una masa sin grumos."
      - icon: mix
        action: Agregar
        time: "2 min"
        text: "Incorporar cebolla picada, tomate, cilantro y chile verde a la masa. La consistencia debe ser similar a la de una crema fluida."
      - icon: rest
        action: Reposar
        time: "5 min"
        text: "Dejar reposar la masa 5 minutos para que el besan se hidrate completamente y los sabores se integren."
      - icon: heat
        action: Calentar
        time: "2 min"
        text: "Calentar una sartén antiadherente a fuego medio. Pincelar ligeramente con aceite cuando esté caliente."
      - icon: pour
        action: Verter
        time: "1 min"
        text: "Verter un cucharón de masa en el centro y extender en círculo con el reverso de la cuchara hasta ~16 cm de diámetro."
      - icon: cook
        action: Cocinar
        time: "2–3 min"
        text: "Cocinar a fuego medio hasta que los bordes se vean secos y aparezcan pequeñas burbujas en la superficie. Rociar unas gotas de aceite por los bordes."
      - icon: flip
        action: Voltear
        time: "1–2 min"
        text: "Voltear con cuidado con una espátula plana. Cocinar 1–2 minutos más hasta que el otro lado esté dorado y crujiente."
      - icon: serve
        action: Servir
        time: ""
        text: "Servir caliente con chutney verde de cilantro-menta y una cucharada de yogur natural sin azúcar."
    tip: "Para un chilla más crujiente, extiende la masa lo más delgada posible. Si se rompe al voltear, la sartén no está suficientemente caliente o la masa es muy espesa."

  - id: upma
    name: Vegetable Upma
    subtitle: Sémola de trigo salteada con verduras y especias
    phase: "Fase 1–2"
    meal: Desayuno
    type: Vegetariano
    prep: "10 min"
    prep_note: ""
    cook: "15 min"
    servings: "2 porciones"
    nutrition:
      kcal: 290
      protein: 8
      carbs: 46
      fat: 7
    image:
      src: "https://images.mohammadasjad.com/hero/upma.webp"
      css_class: img-upma
    highlight_ingredients:
      - Sémola trigo
      - Mostaza
      - Cebolla
      - Zanahoria
      - Ghee
    ingredients:
      - "3/4 taza sémola de trigo (rava/suji)"
      - "1/2 cebolla mediana picada"
      - "1 zanahoria pequeña en cubos"
      - "1/4 taza guisantes frescos o congelados"
      - "1/2 cdta semillas de mostaza"
      - "1/2 cdta dal urad"
      - "6–8 hojas de curry (kari patta)"
      - "1 cdta ghee o aceite de oliva"
      - "1.5 tazas agua caliente"
      - "Sal y zumo de limón al gusto"
    steps:
      - icon: toast
        action: Tostar
        time: "4–5 min"
        text: "Tostar la sémola en seco en una sartén a fuego medio, removiendo constantemente, hasta que emita un aroma a nuez y tome un color ligeramente dorado."
      - icon: heat
        action: Templar
        time: "1 min"
        text: "En otra olla, calentar el ghee a fuego medio. Agregar semillas de mostaza y esperar a que comiencen a chisporrotear."
      - icon: sauté
        action: Sofreír
        time: "1 min"
        text: "Añadir dal urad y hojas de curry. Sofreír 30 segundos hasta que el dal tome color dorado y las hojas se pongan crujientes."
      - icon: mix
        action: Cebolla
        time: "3 min"
        text: "Agregar la cebolla picada y sofreír 3 minutos hasta que quede translúcida. Añadir las verduras (zanahoria, guisantes) y cocinar 2 minutos más."
      - icon: pour
        action: Agua
        time: "1 min"
        text: "Verter el agua caliente, añadir sal y llevar a ebullición. El agua debe estar caliente para evitar grumos al añadir la sémola."
      - icon: mix
        action: Incorporar
        time: "2 min"
        text: "Reducir fuego a bajo y añadir la sémola tostada en forma de lluvia, removiendo constantemente para evitar grumos."
      - icon: cook
        action: Cocinar
        time: "2–3 min"
        text: "Tapar y cocinar a fuego muy bajo 2–3 minutos hasta que la sémola absorba toda el agua y tenga textura esponjosa."
      - icon: serve
        action: Servir
        time: ""
        text: "Esponjar con un tenedor y servir caliente con un chorrito de zumo de limón. Acompañar con chutney de coco o yogur."
    tip: "Tostar bien la sémola en seco es el paso clave: una sémola bien tostada nunca queda pegajosa o apelmazada. El upma debe tener cada grano suelto."

  - id: idli
    name: Idli con Sambar
    subtitle: Bollos de arroz al vapor con sopa de lentejas y verduras
    phase: "Fase 1–2"
